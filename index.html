<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background"></div>
    <div class="overlay"></div>
    <main class="dashboard">
        <nav class="glass navbar">
            <div class="logo">
                <img src="./assets/images/favicon.ico" alt="Logo">
                <span>Productivity Dashboard</span>
            </div>
            <div class="right">
                <div class="dt">
                    <div class="date">
                        <p class="cur-day">Saturday,</p>
                        <p class="cur-date">17</p>
                        <p class="cur-month-year">July, 2026</p>
                    </div>
                    <div class="center time">
                        <p class="cur-time">08:00:00 pm</p>
                    </div>
                </div>
                <i class="ri-sun-fill theme-ic"></i>
            </div>

        </nav>
        <div class="container">
            <div class="card glass weather card-1">
                <section class="welcome">
                    <div class="date-time-weather-card">
                        <div class="glass location">
                            <span><i class="ri-map-pin-line"></i></span>
                            <p class="location-txt">Bhopal, MP</p>
                        </div>
                        <div class="glass weather">
                            <div class="left">
                                <h2 class="temp">24<span>°C</span></h2>
                                <h4 class="temp-feels-txt">Feels like 30<span>°C</span></h4>
                                <p class="weather-txt">Cloudy</p>
                            </div>
                            <i class="icon ri-cloud-line weather-icon"></i>
                        </div>

                        <div class="bottom">
                            <div class="glass card wind">
                                <i class="ri-windy-line wind-ic"></i>
                                <h3 class="wind-txt">NW 11.5 kph</h3>
                            </div>
                            <div class="glass card humidity">
                                <i class="ri-water-percent-line humidity-ic"></i>
                                <h3 class="humidity-txt">70%</h3>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
        <footer class="dock">
            <div class="icon feature todo-list" data-feature="todo-list">
                <img src="./assets/images/todo.png" alt="icon" />
            </div>
            <div class="icon feature daily-planner" data-feature="daily-planner">
                <img src="./assets/images/planner.png" alt="icon" />
            </div>
            <div class="icon feature motivational-quotes" data-feature="motivational-quotes">
                <img src="./assets/images/motivation.png" alt="icon" />
            </div>
            <div class="icon feature pomodoro-timer" data-feature="pomodoro-timer">
                <img src="./assets/images/pomodoro.png" alt="icon" />
            </div>
            <div class="icon feature goals" data-feature="goals">
                <img src="./assets/images/goal.png" alt="icon" />
            </div>

        </footer>
    </main>
    <div class="popup glass" id="popup">
        <div class="glass popup-card">
            <i class="ri-close-line close"></i>
            <div id="popup-content">
                No data available.
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
