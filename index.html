<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background"></div>
    <div class="overlay"></div>
    <main class="dashboard">
        <nav class="glass navbar">
            <div class="logo">
                <img src="./assets/images/favicon.ico" alt="Logo">
                <span>Productivity Dashboard</span>
            </div>
            <i class="theme-btn ri-sun-fill"></i>

        </nav>
        <div class="container">
            <div class="card glass weather card-1">
                <section class="welcome">
                    <div class="date-time-weather-card">
                        <div class="glass location">
                            <span><i class="ri-map-pin-line"></i></span>
                            <p class="location-txt">Bhopal, MP</p>
                        </div>
                        <div class="glass weather">
                            <div class="left">
                                <h2 class="temp">24<span>°C</span></h2>
                                <p class="weather-txt">Cloudy</p>
                            </div>
                            <i class="icon ri-cloud-line weather-icon"></i>
                        </div>

                        <div class="bottom">
                            <div class="glass card date">
                                <h2 class="cur-date">17</h2>
                                <h3 class="cur-day">Saturday</h3>
                                <p class="cur-month-year">July, 2026</p>
                            </div>
                            <div class="glass card center time">
                                <h2 class="cur-time">08:00:00 pm</h2>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="card glass todo card-2">
                <button class="feature todo-list" data-feature="todo-list">Todo List</button>
            </div>

            <div class="card glass planner card-3">
                <button class="feature daily-planner" data-feature="daily-planner">Daily Planner</button>

            </div>

            <div class="card glass quote card-4">
                <button class="feature motivational-quotes" data-feature="motivational-quotes">Motivational
                    Quotes</button>
            </div>

            <div class="card glass pomo card-5">
                <button class="feature pomodoro-timer" data-feature="pomodoro-timer">Pomodoro Timer</button>
            </div>

            <div class="card glass goal card-6">
                <button class="feature goals" data-feature="goals">Goals</button>
            </div>
        </div>


    </main>
    <div class="popup glass" id="popup">
        <div class="glass popup-card">
            <i class="ri-close-line close"></i>
            <div id="popup-content">
                No data available.
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
