<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background"></div>
    <div class="overlay"></div>
    <main class="dashboard">
        <nav class="glass navbar">
            <div class="logo">
                <img src="./assets/images/favicon.ico" alt="Logo">
                <span>Productivity Dashboard</span>
            </div>
            <i class="theme-btn ri-sun-fill"></i>

        </nav>

        <section class="glass welcome">
            <h1>Welcome Shiny</h1>
        </section>
        <section class="glass features">

            <button class="feature todo-list" data-feature="todo-list">
                Todo List
            </button>

            <button class="feature daily-planner" data-feature="daily-planner">
                Daily Planner
            </button>

            <button class="feature motivational-quotes" data-feature="motivational-quotes">
                Motivational Quotes
            </button>

            <button class="feature pomodoro-timer" data-feature="pomodoro-timer">
                Pomodoro Timer
            </button>

            <button class="feature goals" data-feature="goals">
                Goals
            </button>

        </section>

    </main>
    <div class="popup glass" id="popup">

        <div class="glass popup-card">

            <i class="ri-close-line close"></i>

            <h2 id="popup-title"></h2>
            <p id="popup-content">
                This is your feature page.
            </p>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
